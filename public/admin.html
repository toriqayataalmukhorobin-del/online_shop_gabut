<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Toko Online</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/index.html"><i class="bi bi-speedometer2 me-2"></i>Admin Dashboard</a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3">
                    <i class="bi bi-person-circle me-1"></i>
                    <span id="username"></span>
                </span>
                <a class="btn btn-outline-light btn-sm" href="/index.html">Kembali ke Toko</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="error" class="alert alert-danger d-none"></div>
        
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card bg-primary text-white">
                    <div class="card-body">
                        <h5 class="card-title"><i class="bi bi-box me-2"></i>Total Produk</h5>
                        <h2 class="card-text" id="totalProducts">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-success text-white">
                    <div class="card-body">
                        <h5 class="card-title"><i class="bi bi-receipt me-2"></i>Total Pesanan</h5>
                        <h2 class="card-text" id="totalOrders">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-info text-white">
                    <div class="card-body">
                        <h5 class="card-title"><i class="bi bi-currency-dollar me-2"></i>Total Penjualan</h5>
                        <h2 class="card-text">Rp <span id="totalSales">0</span></h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-warning text-white">
                    <div class="card-body">
                        <h5 class="card-title"><i class="bi bi-people me-2"></i>Total User</h5>
                        <h2 class="card-text" id="totalUsers">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <ul class="nav nav-tabs mb-4" id="adminTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#ordersTab">Pesanan</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#usersTab">User</button>
            </li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="ordersTab">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Manajemen Pesanan</h5>
                        <div id="ordersList">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Memuat...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="tab-pane fade" id="usersTab">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Manajemen User</h5>
                        <div id="usersList">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Memuat...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = '/products';
        const AUTH_URL = '/auth';
        const ORDER_URL = '/orders';
        let token = localStorage.getItem('token');
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', () => {
            if (!token) {
                window.location.href = '/login.html';
                return;
            }

            const user = JSON.parse(localStorage.getItem('user'));
            if (!user || user.role !== 'admin') {
                alert('Akses ditolak. Halaman ini hanya untuk admin.');
                window.location.href = '/index.html';
                return;
            }

            currentUser = user;
            document.getElementById('username').textContent = user.username;
            
            loadDashboardStats();
            loadOrders();
            loadUsers();
        });

        async function loadDashboardStats() {
            try {
                const [productsRes, ordersRes, usersRes] = await Promise.all([
                    fetch(API_URL),
                    fetch(ORDER_URL, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    }),
                    fetch(`${AUTH_URL}/profile`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    })
                ]);

                const products = await productsRes.json();
                const orders = await ordersRes.json();
                
                document.getElementById('totalProducts').textContent = products.length;
                
                const uniqueOrders = {};
                orders.forEach(order => {
                    if (!uniqueOrders[order.id]) {
                        uniqueOrders[order.id] = {
                            id: order.id,
                            total: order.total
                        };
                    }
                });
                const orderArray = Object.values(uniqueOrders);
                document.getElementById('totalOrders').textContent = orderArray.length;
                
                const totalSales = orderArray.reduce((sum, order) => sum + parseFloat(order.total), 0);
                document.getElementById('totalSales').textContent = totalSales.toLocaleString('id-ID');
                
                document.getElementById('totalUsers').textContent = '1';
            } catch (error) {
                console.error('Error loading dashboard stats:', error);
            }
        }

        async function loadOrders() {
            try {
                const response = await fetch(`${ORDER_URL}/all/orders`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const orders = await response.json();
                
                const ordersList = document.getElementById('ordersList');
                
                if (orders.length === 0) {
                    ordersList.innerHTML = '<p class="text-muted">Belum ada pesanan</p>';
                    return;
                }
                
                const uniqueOrders = {};
                orders.forEach(order => {
                    if (!uniqueOrders[order.id]) {
                        uniqueOrders[order.id] = {
                            id: order.id,
                            status: order.status,
                            total: order.total,
                            created_at: order.created_at,
                            items: []
                        };
                    }
                    uniqueOrders[order.id].items.push({
                        product_name: order.product_name,
                        quantity: order.quantity
                    });
                });
                
                const orderArray = Object.values(uniqueOrders).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                
                ordersList.innerHTML = orderArray.map(order => {
                    const statusColors = {
                        pending: 'warning',
                        paid: 'info',
                        shipped: 'primary',
                        completed: 'success',
                        cancelled: 'danger'
                    };
                    const statusLabels = {
                        pending: 'Pending',
                        paid: 'Dibayar',
                        shipped: 'Dikirim',
                        completed: 'Selesai',
                        cancelled: 'Dibatalkan'
                    };
                    
                    return `
                        <div class="card mb-3">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="mb-1">Pesanan #${order.id}</h6>
                                        <p class="mb-0 text-muted">${new Date(order.created_at).toLocaleDateString('id-ID')}</p>
                                    </div>
                                    <div class="text-end">
                                        <span class="badge bg-${statusColors[order.status]}">${statusLabels[order.status]}</span>
                                        <p class="mb-0 mt-1">Rp ${parseFloat(order.total).toLocaleString('id-ID')}</p>
                                    </div>
                                </div>
                                <div class="mt-2">
                                    <select class="form-select form-select-sm" onchange="updateOrderStatus(${order.id}, this.value)">
                                        <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>Pending</option>
                                        <option value="paid" ${order.status === 'paid' ? 'selected' : ''}>Dibayar</option>
                                        <option value="shipped" ${order.status === 'shipped' ? 'selected' : ''}>Dikirim</option>
                                        <option value="completed" ${order.status === 'completed' ? 'selected' : ''}>Selesai</option>
                                        <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>Dibatalkan</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading orders:', error);
            }
        }

        async function updateOrderStatus(orderId, status) {
            try {
                const response = await fetch(`${ORDER_URL}/${orderId}/status`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status })
                });

                if (response.ok) {
                    loadOrders();
                } else {
                    alert('Gagal mengupdate status pesanan');
                }
            } catch (error) {
                alert('Gagal mengupdate status pesanan');
                console.error('Error:', error);
            }
        }

        async function loadUsers() {
            const usersList = document.getElementById('usersList');
            usersList.innerHTML = `
                <div class="alert alert-info">
                    <i class="bi bi-info-circle me-2"></i>
                    Fitur manajemen user akan segera hadir!
                </div>
            `;
        }
    </script>
</body>
</html>
